# Default terminal is 256 colors
set -g default-terminal 'xterm-256color'
set -ga terminal-overrides ',*256col*:Tc'

# Enable OSC 52 passthrough
set -s set-clipboard on

# Set the time the pane numbers are displayed
set -g display-panes-time 2000

# Start windows and panes index at 1, not 0.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Allow mouse interactions
set -g mouse on

# Keybindings
setw -g mode-keys vi

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# General config
set -g status-position top

# Dracula Theme
set -g @dracula-military-time true
set -g @dracula-show-powerline true
set -g @dracula-transparent-powerline-bg false
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-show-battery false
set -g @dracula-inverse-divider ' '
set -g @dracula-plugins "tmux-ram-usage ssh-session"
set -g @dracula-tmux-ram-usage-label " "

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.config/tmux/plugins/tpm/tpm'
